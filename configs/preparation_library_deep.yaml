            u: 39
            g: 101
            r: 103
            i: 168
            z: 112
            y: 16
        theta: # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            u: 1.4
            g: 1.4
            r: 1.4
            i: 1.4
            z: 1.4
            y: 1.4
  - ErrorModel:
      name: lsst_obs_cond_dp1
      ErrorModel: ObsCondition
      Module: rail.creation.degraders.observing_condition_degrader
      Bands: ['u', 'g', 'r', 'i', 'z', 'y']
