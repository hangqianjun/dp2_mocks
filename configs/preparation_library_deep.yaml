# These are templates for catalogs produced in the early stages of the analysis
Catalogs:
  #- CatalogTemplate:
  #    name: truth_roman_rubin
  #    path_template: "{catalogs_dir}/{project}_roman_rubin/{pixel}/part-0.parquet"
  #    iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_cardinal
      path_template: "{catalogs_dir}/{project}_cardinal/{pixel}/part-0.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: truth_flagship
      path_template: "{catalogs_dir}/{pixel}.parquet"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: reduced
      path_template: "{catalogs_dir}/{project}_{selection}/{pixel}/part-0.pq"
      iteration_vars: ['pixel']
  - CatalogTemplate:
      name: degraded
      path_template: "{catalogs_dir}/{project}_{selection}_{flavor}/{pixel}/{basename}"
      iteration_vars: ['pixel']


# These are templates for specific files, such as testing and training files
Files:
  - FileTemplate:
      name: test_file_100k
      path_template: "{catalogs_dir}/test/{project}_{selection}_baseline_100k.hdf5"
  - FileTemplate:
      name: train_file_100k
      path_template: "{catalogs_dir}/train/{project}_{selection}_baseline_100k.hdf5"


# These describe all the algorithms that estimate PZ
PZAlgorithms:
  - PZAlgorithm:
      name: trainz
      Estimate: TrainZEstimator
      Inform: TrainZInformer
      Module: rail.estimation.algos.train_z
  - PZAlgorithm:
      name: simplenn
      Estimate: SklNeurNetEstimator
      Inform: SklNeurNetInformer
      Module: rail.estimation.algos.sklearn_neurnet
  - PZAlgorithm:
      name: fzboost
      Estimate: FlexZBoostEstimator
      Inform: FlexZBoostInformer
      Module: rail.estimation.algos.flexzboost
  - PZAlgorithm:
      name: knn
      Estimate: KNearNeighEstimator
      Inform: KNearNeighInformer
      Module: rail.estimation.algos.k_nearneigh
  - PZAlgorithm:
      name: gpz
      Estimate: GPzEstimator
      Inform: GPzInformer
      Module: rail.estimation.algos.gpz
  - PZAlgorithm:
      name: bpz
      Estimate: BPZliteEstimator
      Inform: BPZliteInformer
      Module: rail.estimation.algos.bpz_lite
  - PZAlgorithm:
      name: tpz
      Estimate: TPZliteEstimator
      Inform: TPZliteInformer
      Module: rail.estimation.algos.tpz_lite


# These describe the ways we can sub-sample the data
Subsamplers:
  - Subsampler:
      name: random_subsampler
      Subsample: RandomSubsampler
      Module: rail.projects.subsampler
  - Subsampler:
      name: multi_catalog_subsampler
      Subsample: MultiCatalogSubsampler
      Module: rail.projects.subsampler


# These describe the ways we can reduce the data
Reducers:
  - Reducer:
      name: roman_rubin
      Reduce: RomanRubinReducer
      Module: rail.projects.reducer
  - Reducer:
      name: flagship
      Reduce: FlagshipReducer
      Module: rail.projects.reducer
  - Reducer:
      name: cardinal
      Reduce: CardinalReducer
      Module: rail.projects.reducer


# These describe the selections going from Input to Reduced catalog
Selections:
  #- Selection:
  #    name: roman_rubin_gold
  #    cuts:
  #      maglim_i: [null, 25.5]
  #- Selection:
  #    name: cardinal_gold
  #    cuts:
  #      maglim_i: [null, 25.5]
  #- Selection:
  #    name: flagship_gold
  #    cuts:
  #      maglim_i: [null, 25.5]
  - Selection:
      name: flagship_deep
      cuts:
        maglim_i: [null, 27.0]
  - Selection:
      name: cardinal_deep
      cuts:
        maglim_i: [null, 27.0]


# These describe ways to subsampe the data
Subsamples:
  - Subsample:
      name: test_100k
      seed: 1234
      num_objects: 100000
  - Subsample:
      name: train_100k
      seed: 4321
      num_objects: 100000

# These describe the error models we use in the truth_to_observed pipeline # modify this to dp2
ErrorModels:
  - ErrorModel:
      name: lsst_cosmos_dp1
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
      Overrides:
        nYrObs: 1.  # do not change this as we use total number of visits
        nVisYr:  # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            u: 100
            g: 82
            r: 166
            i: 139
            z: 111
            y: 66
        theta: # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            u: 1.22
            g: 1.22
            r: 1.22
            i: 1.22
            z: 1.22
            y: 1.22
  - ErrorModel:
      name: lsst_ddf_edfs_a_sv
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
      Overrides:
        nYrObs: 1.  # do not change this as we use total number of visits
        nVisYr:  # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 20
            r: 21
            i: 28
            z: 18
        theta: # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 1.32
            r: 1.32
            i: 1.32
            z: 1.32

  - ErrorModel:
      name: lsst_ddf_edfs_b_sv
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
      Overrides:
        nYrObs: 1.  # do not change this as we use total number of visits
        nVisYr:  # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 24
            r: 21
            i: 29
            z: 18
        theta: # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 1.37
            r: 1.37
            i: 1.37
            z: 1.37
  - ErrorModel:
      name: lsst_ddf_ecdfs_sv
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
      Overrides:
        nYrObs: 1.  # do not change this as we use total number of visits
        nVisYr:  # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 36
            r: 39
            i: 41
            z: 44
        theta: # from https://survey-strategy.lsst.io/progress/sv_status/sv_20250930.html#id1
            g: 1.51
            r: 1.51
            i: 1.51
            z: 1.51
  - ErrorModel:
      name: lsst_ddf_elaiss1_sv
      ErrorModel: LSSTErrorModel
      Module: rail.creation.degraders.photometric_errors
      Overrides:
        nYrObs: 1.  # do not change this as we use total number of visits
