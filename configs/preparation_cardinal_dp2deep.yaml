Project:

  Includes:
    - "/global/homes/q/qhang/desc/flagship_dp2/preparation_library_dp2deep.yaml"

  Name: dp2_mock_deep

  PathTemplates: {}

  # These are used to make all the other paths
  CommonPaths:
    project: dp2_deep_mock_run
    sim_version: cardinal
    root: "/global/cfs/cdirs/lsst/groups/PZ/Cardinal"
    scratch_root: "{root}"
    catalogs_dir: "{root}/parquet_files"

  # Baseline configuraiton, included in others by default
  Baseline:
    catalog_tag: cardinal_test
    pipelines: ['all']


  Flavors:
    - Flavor:
        name: test
        pipeline_overrides:
          truth_to_observed:
            kwargs:
              error_models: ['lsst_cosmos_dp2']
              models_to_run_select: ['lsst_cosmos_dp2']
              selectors: ['zCOSMOS']
          photometric_errors:
            kwargs:
              error_models: ['lsst_cosmos_dp2']

  # These are variables that we iterate over when running over entire catalogs
  IterationVars:
    pixel:
        - 16 # chosen at random, not overlapping any of the wfd pixels