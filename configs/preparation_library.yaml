  - SpecSelection:
      name: DESI_BGS_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "bgs"
        threshold_col: "lm_halo"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/bgs_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_LRG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "lrg"
        threshold_col: "log_stellar_mass"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/lrg_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_ELG_flagship
      Select: SpecSelection_DESI_Phy
      Module: rail.creation.degraders.desi_selector_phy
      Overrides:
        desi_type: "elg"
        threshold_col: "log_sfr"
        threshold_table: "/global/cfs/cdirs/lsst/groups/PZ/data/desi_thresholds/elg_threshold_flagship.parquet"
  - SpecSelection:
      name: DESI_BGS_color
      Select: SpecSelection_DESI_BGS
      Module: rail.creation.degraders.spectroscopic_selections
      Overrides:
        colnames:
          g: mag_g_lsst
          r: mag_r_lsst
          i: mag_i_lsst
          z: mag_z_lsst
          redshift: redshift
  - SpecSelection:
      name: DESI_LRG_color
      Select: SpecSelection_DESI_LRG
      Module: rail.creation.degraders.spectroscopic_selections
      Overrides:
        colnames:
          g: mag_g_lsst
          r: mag_r_lsst
          i: mag_i_lsst
          z: mag_z_lsst
          W1: WISE_W1
          redshift: redshift
  - SpecSelection:
      name: DESI_ELG_LOP_color
      Select: SpecSelection_DESI_ELG_LOP
      Module: rail.creation.degraders.spectroscopic_selections
      Overrides:
        colnames:
          g: mag_g_lsst
          r: mag_r_lsst
          i: mag_i_lsst
          z: mag_z_lsst
          redshift: redshift

# These describe the various data analysis pipelines
Pipelines:
  - PipelineTemplate:
      name: truth_to_observed
      pipeline_class: rail.pipelines.degradation.truth_to_observed.TruthToObservedPipeline
      input_catalog_template: reduced
      output_catalog_template: degraded
      kwargs:
        error_models: ['lsst_obs_cond_dp2']
        selectors: ['all']
        blending: false
        parallel: true
  - PipelineTemplate:
      name: photometric_errors
      pipeline_class: rail.pipelines.degradation.apply_phot_errors.ApplyPhotErrorsPipeline
      input_catalog_template: reduced
      output_catalog_template: degraded
      kwargs:
        error_models: ['lsst_obs_cond_dp2']
        parallel: true
  - PipelineTemplate:
      name: blending
      input_catalog_template: degraded
      output_catalog_template: degraded
      pipeline_class: rail.pipelines.degradation.blending.BlendingPipeline
      kwargs: {}
  - PipelineTemplate:
      name: spec_selection
      input_catalog_template: degraded
      output_catalog_template: degraded
      pipeline_class: rail.pipelines.degradation.spectroscopic_selection_pipeline.SpectroscopicSelectionPipeline
      kwargs:
        selectors: ['all']


